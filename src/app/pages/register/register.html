<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">StudyFlow</h1>
    <p class="text-center text-gray-500 text-sm mb-6">Crie sua conta</p>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
        <input type="text" [(ngModel)]="name" name="name" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Seu nome completo" />
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" [(ngModel)]="email" name="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="seu@email.com" />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" [(ngModel)]="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="••••••" />
      </div>

      <div *ngIf="error" class="mb-4 text-sm text-red-600 text-center">{{ error }}</div>

      <button type="submit" [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition disabled:opacity-50">
        {{ loading ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Já tem conta? <a routerLink="/login" class="text-blue-600 hover:underline">Entrar</a>
    </p>
  </div>
</div>
